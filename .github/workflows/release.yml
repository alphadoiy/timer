name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: timer
            asset_suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            binary_name: timer
            asset_suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: timer.exe
            asset_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix assets
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="timer-${GITHUB_REF_NAME}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${asset}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${asset}" > "dist/${asset}.sha256"
          else
            shasum -a 256 "dist/${asset}" > "dist/${asset}.sha256"
          fi

      - name: Package Windows assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $asset = "timer-$env:GITHUB_REF_NAME-${{ matrix.target }}${{ matrix.asset_suffix }}"
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/$asset"
          $hash = (Get-FileHash "dist/$asset" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/$asset.sha256" -Value "$hash  $asset"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="${tag}"
          notes="Automated release build for ${tag}."

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            if [[ "${tag}" == *-* ]]; then
              gh release create "${tag}" --title "${title}" --notes "${notes}" --prerelease || true
            else
              gh release create "${tag}" --title "${title}" --notes "${notes}" || true
            fi
          fi

          gh release upload "${tag}" dist/* --clobber
